	if (vendors.length === 0) {
		const li = document.createElement("li");
		li.innerHTML = `
			<span class="item-content item-link">
			  <div class="dz-inner">
				<div class="dz-title">COMING SOON</div> 
			  </div>
			</span>
		  `;
		  listEl.appendChild(li);
	} else {
		vendors
		  .filter(v => v.name && v.name.trim() !== "")   // <-- TOEGEVOEGD
		  .sort((a, b) => a.name.localeCompare(b.name))
		  .forEach(v => {
		  const li = document.createElement("li");
		  if (v.picture === 'noimage.jpg') {
			  li.innerHTML = `
				<a class="item-content">
				  <div class="dz-inner">
					<div class="dz-title">${v.name}</div> 
				  </div>
				</a>
			  `;
		  }
		  else {
			  li.innerHTML = `
				<a href="vendor.html?id=${v.id}" class="item-content item-link">
				  <div class="dz-inner">
					<div class="dz-title">${v.name}</div> 
				  </div>
				</a>
			  `;
		  }
		  listEl.appendChild(li);
		});
	}
